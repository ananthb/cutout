name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            extra-substituters = https://cache.garnix.io
            extra-trusted-public-keys = cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g=

      - name: Write production config
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
        run: |
          cat > wrangler.production.toml <<EOF
          name = "cutout"
          main = "worker-shim.mjs"
          compatibility_date = "2024-01-01"
          account_id = "${CLOUDFLARE_ACCOUNT_ID}"

          [build]
          command = "worker-build --release"

          [[kv_namespaces]]
          binding = "KV"
          id = "${KV_NAMESPACE_ID}"

          [[send_email]]
          name = "EMAIL"

          [[d1_databases]]
          binding = "DB"
          database_name = "cutout-db"
          database_id = "${D1_DATABASE_ID}"

          [[r2_buckets]]
          binding = "EMAILS"
          bucket_name = "cutout-emails"

          [[queues.producers]]
          binding = "RETRIES"
          queue   = "cutout-retries"

          [[queues.consumers]]
          queue              = "cutout-retries"
          max_batch_size     = 5
          max_batch_timeout  = 10
          max_retries        = 8
          dead_letter_queue  = "cutout-retries-dlq"

          [[queues.consumers]]
          queue          = "cutout-retries-dlq"
          max_batch_size = 5

          [[analytics_engine_datasets]]
          binding = "EVENTS"
          dataset = "cutout_events"

          [vars]
          ENVIRONMENT = "production"
          # Account id is non-sensitive; the Worker uses it to build the
          # Analytics Engine SQL API URL when CF_API_TOKEN is set.
          CF_ACCOUNT_ID = "${CLOUDFLARE_ACCOUNT_ID}"

          [observability.logs]
          enabled = true
          invocation_logs = true
          EOF
          # Remove leading whitespace from heredoc
          sed -i 's/^          //' wrangler.production.toml

      - name: Ensure D1 schema
        # Belt-and-suspenders for `migrations apply`: if the d1_migrations
        # metadata table ever drifts from the actual schema (e.g. a partial
        # earlier deploy), this guarantees the tables exist before the worker
        # starts hitting them. Safe because every statement is IF NOT EXISTS.
        run: nix develop --command wrangler d1 execute cutout-db --remote --file migrations/0000_init.sql -c wrangler.production.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply Migrations
        run: nix develop --command wrangler d1 migrations apply cutout-db --remote -c wrangler.production.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build and Deploy
        run: nix develop --command wrangler deploy -c wrangler.production.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set secrets
        run: |
          echo "${{ secrets.CF_ACCESS_TEAM }}" | nix develop --command wrangler secret put CF_ACCESS_TEAM -c wrangler.production.toml
          echo "${{ secrets.CF_ACCESS_AUD }}" | nix develop --command wrangler secret put CF_ACCESS_AUD -c wrangler.production.toml
          # Optional: CF_API_TOKEN unlocks the dashboard's stats panels
          # (Account Analytics: Read scope). Empty value is OK — stats just
          # stay hidden until you add the secret in repo settings.
          echo "${{ secrets.CF_API_TOKEN }}" | nix develop --command wrangler secret put CF_API_TOKEN -c wrangler.production.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
