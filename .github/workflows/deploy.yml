name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            extra-substituters = https://cache.garnix.io
            extra-trusted-public-keys = cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g=

      - name: Write production config
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
        run: |
          cat > wrangler.production.toml <<EOF
          name = "cutout"
          main = "worker-shim.mjs"
          compatibility_date = "2024-01-01"
          account_id = "${CLOUDFLARE_ACCOUNT_ID}"

          [build]
          command = "worker-build --release"

          [[kv_namespaces]]
          binding = "KV"
          id = "${KV_NAMESPACE_ID}"

          [[send_email]]
          name = "EMAIL"

          [[d1_databases]]
          binding = "DB"
          database_name = "cutout-db"
          database_id = "${D1_DATABASE_ID}"

          [vars]
          ENVIRONMENT = "production"

          [observability.logs]
          enabled = true
          invocation_logs = true
          EOF
          # Remove leading whitespace from heredoc
          sed -i 's/^          //' wrangler.production.toml

      - name: Apply Migrations
        run: nix develop --command wrangler d1 migrations apply cutout-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build and Deploy
        run: nix develop --command wrangler deploy -c wrangler.production.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set secrets
        run: |
          echo "${{ secrets.CF_ACCESS_TEAM }}" | nix develop --command wrangler secret put CF_ACCESS_TEAM -c wrangler.production.toml
          echo "${{ secrets.CF_ACCESS_AUD }}" | nix develop --command wrangler secret put CF_ACCESS_AUD -c wrangler.production.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
